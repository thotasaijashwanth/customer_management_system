# ==========================================
# Server Configuration
# ==========================================
server.port=8080
server.servlet.context-path=/

# ==========================================
# Application Name
# ==========================================
spring.application.name=customer-management-system

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/customer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==========================================
# Jackson Configuration
# ==========================================
spring.jackson.default-property-inclusion=non_null

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.com.cms.customermanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# CORS Allowed Origins (used by CorsConfig)
# ==========================================
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
